<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body{
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body{
      background-image: url('img/fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Capa oscura */
    .overlay{
      width: 100%;
      height: 100%;

      background: rgba(0,0,0,0.35);

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 15px;
    }

    .wrapper{
      width: 100%;
      max-width: 420px;

      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contenedor{
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(5px);

      border-radius: 18px;

      padding: 22px;

      text-align: center;

      box-shadow: 0 5px 20px rgba(0,0,0,0.25);
    }

    h1{
      font-size: 22px;
      color: #222;
      margin-bottom: 18px;
    }

    .boton{
      display: block;

      width: 100%;

      text-decoration: none;

      color: white;

      padding: 14px;

      margin-top: 12px;

      border-radius: 12px;

      font-size: 16px;
      font-weight: bold;

      transition: 0.2s;
    }

    .boton:active{
      transform: scale(0.97);
    }

    .whatsapp{
      background: #25D366;
    }

    .correo{
      background: #0078D7;
    }

    .llamada{
      background: #ff5722;
    }

    /* Ajustes celulares pequeños */
    @media (max-height: 700px){

      .contenedor{
        padding: 18px;
      }

      h1{
        font-size: 19px;
        margin-bottom: 14px;
      }

      .boton{
        padding: 12px;
        font-size: 15px;
        margin-top: 10px;
      }
    }

  </style>
</head>

<body>

  <div class="overlay">

    <div class="wrapper">

      <div class="contenedor">

        <h1>Reserva Liquiñe</h1>

        <a class="boton whatsapp"
           href="https://wa.me/56981971981">
          WhatsApp
        </a>

        <a class="boton correo"
           href="mailto:reservaliquine@gmail.com">
          Correo
        </a>

      </div>

      <div class="contenedor">

        <h1>Reserva Cabañas Talcahuano</h1>

        <a class="boton llamada"
           href="tel:412745587">
          Teléfono Fijo
        </a>

        <a class="boton correo"
           href="mailto:rjaraf@armada.cl">
          Correo
        </a>

      </div>

    </div>

  </div>

</body>
</html>
