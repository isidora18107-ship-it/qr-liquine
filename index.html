<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;

      /* Fondo */
      background-image: url('img/fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Oscurece un poco el fondo para que se lea mejor */
    /* .overlay {
      width: 100%;
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.35);

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
    } */

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    .contenedor {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(4px);

      padding: 25px;
      border-radius: 18px;

      box-shadow: 0 6px 20px rgba(0,0,0,0.2);

      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #222;
    }

    .boton {
      display: block;
      width: 100%;

      padding: 15px;
      margin-top: 12px;

      text-decoration: none;
      color: white;

      border-radius: 12px;

      font-size: 17px;
      font-weight: bold;

      transition: 0.2s ease;
    }

    .boton:active {
      transform: scale(0.97);
    }

    .whatsapp {
      background: #25D366;
    }

    .correo {
      background: #0078D7;
    }

    .llamada {
      background: #ff5722;
    }

    @media (max-width: 480px) {

      body {
        padding: 0;
      }

      .overlay {
        padding: 15px;
      }

      .contenedor {
        padding: 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: 20px;
      }

      .boton {
        font-size: 16px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">

    <div class="wrapper">

      <div class="contenedor">
        <h1>Reserva Liquiñe</h1>

        <a class="boton whatsapp"
           href="https://wa.me/56981971981">
          WhatsApp
        </a>

        <a class="boton correo"
           href="mailto:reservaliquine@gmail.com">
          Correo
        </a>
      </div>

      <div class="contenedor">
        <h1>Reserva Cabañas Talchuano</h1>

        <a class="boton llamada"
           href="tel:+56412745587">
          Teléfono Fijo
        </a>

        <a class="boton correo"
           href="mailto:rjaraf@armada.cl">
          Correo
        </a>
      </div>

    </div>

  </div>

</body>
</html>
